    <!-- COMIENZO DEL MAIN -->
    <main class="main_contacto">
    <!-- TITULO -->
        <h1 class="titulo">CONTACTO</h1>
        <!-- FORMULARIO -->
        <form class="formulario">
            <div class="name">
                <label class="indicacion" for="name">Nombre:</label>
                <input class="indicacion" type="name" placeholder="Ingrese su nombre">
            </div>
            <div class="email">
                <label class="indicacion" for="email">Email:</label>
                <input class="indicacion" type="email" placeholder="Ingrese su email">
            </div>
            <div class="nacionalidad">
                <label class="indicacion" for="nacionalidad">Indique su nacionalidad</label>
                <select class="indicacion" name="nacionalidad">
                    <option disabled selected>Seleccionar</option>
                    <option value="arg">Argentina</option>
                    <option value="bra">Brasil</option>
                    <option value="bol">Bolivia</option>
                    <option value="chi">Chile</option>
                    <option value="par">Paraguay</option>
                    <option value="uru">Uruguay</option>
                    <option value="uru">Otra...</option>
                </select>
            </div>
            <div class="comentario">
                <textarea class="indicacion" placeholder="Dejanos tu comentario." name="" id="" cols="70" rows="10"></textarea>
            </div>
            <div class="check">
                <label class="indicacion" for="check1">Deseo recibir novedades via email </label>
                <input class="indicacion" type="checkbox" name="check1">
            </div>
            <div class="clean">
                <input class="indicacion" type="reset" value="Limpiar formulario">
            </div>
            <div class="send">
                <input class="indicacion" type="submit" value="Enviar comentario">
            </div>
        </form>
        <h2 class="subtitulo">ENCONTRANOS EN:</h2>
        <div class="mapa">

        </div>
        </main>
